name: Build Choreo Nezha Agent

on:
  workflow_dispatch:
    inputs:
      upstream_ref:
        description: "Upstream nezhahq/agent tag/branch/SHA. Leave empty for latest release tag."
        required: false
        type: string
      choreo_suffix:
        description: "SemVer prerelease suffix appended to upstream version."
        required: false
        default: "choreo.1"
        type: string
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout choreo repo
        uses: actions/checkout@v4
        with:
          path: choreo-repo

      - name: Resolve upstream ref and Choreo tag
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_REF: ${{ inputs.upstream_ref }}
          INPUT_SUFFIX: ${{ inputs.choreo_suffix }}
        run: |
          set -euo pipefail

          if [ -n "${INPUT_REF:-}" ]; then
            UPSTREAM_REF="$INPUT_REF"
          else
            UPSTREAM_REF=$(gh release view --repo nezhahq/agent --json tagName --jq .tagName)
          fi

          UPSTREAM_VERSION="${UPSTREAM_REF#v}"
          SUFFIX="${INPUT_SUFFIX:-choreo.1}"
          CHOREO_VERSION="${UPSTREAM_VERSION}-${SUFFIX}"
          CHOREO_TAG="v${CHOREO_VERSION}"

          echo "upstream_ref=${UPSTREAM_REF}" >> "$GITHUB_OUTPUT"
          echo "choreo_version=${CHOREO_VERSION}" >> "$GITHUB_OUTPUT"
          echo "choreo_tag=${CHOREO_TAG}" >> "$GITHUB_OUTPUT"

          echo "Upstream ref: ${UPSTREAM_REF}"
          echo "Choreo tag: ${CHOREO_TAG}"

      - name: Check release existence
        id: release_exists
        env:
          GH_TOKEN: ${{ github.token }}
          CHOREO_TAG: ${{ steps.version.outputs.choreo_tag }}
        run: |
          set -euo pipefail
          if gh release view "$CHOREO_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $CHOREO_TAG already exists; nothing to do."
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout upstream agent
        if: steps.release_exists.outputs.exists != 'true'
        uses: actions/checkout@v4
        with:
          repository: nezhahq/agent
          ref: ${{ steps.version.outputs.upstream_ref }}
          path: agent-src
          fetch-depth: 0

      - name: Set up Go
        if: steps.release_exists.outputs.exists != 'true'
        uses: actions/setup-go@v5
        with:
          go-version-file: agent-src/go.mod
          cache-dependency-path: agent-src/go.sum

      - name: Apply Choreo agent patch
        if: steps.release_exists.outputs.exists != 'true'
        working-directory: agent-src
        run: |
          set -euo pipefail
          bash ../choreo-repo/agent/apply-choreo-ws-tunnel.sh
          go get github.com/coder/websocket@latest
          go mod tidy

      - name: Configure Choreo release archives
        if: steps.release_exists.outputs.exists != 'true'
        working-directory: agent-src
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path('.goreleaser.yml')
          text = path.read_text()
          if 'choreo-nezha_agent_{{ .Version }}_{{ .Os }}_{{ .Arch }}' in text:
              raise SystemExit(0)
          if text.startswith('archives:') or '\narchives:' in text:
              raise SystemExit('upstream .goreleaser.yml already defines archives; update Choreo archive naming logic')

          archive = '''archives:
            - formats:
                - tar.gz
              name_template: "choreo-nezha_agent_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

          '''
          if '\nsnapshot:' in text:
              text = text.replace('\nsnapshot:', '\n' + archive + 'snapshot:', 1)
          else:
              text = text.rstrip() + '\n\n' + archive
          path.write_text(text)
          PY

      - name: Prepare release tag for GoReleaser
        if: steps.release_exists.outputs.exists != 'true'
        working-directory: agent-src
        env:
          CHOREO_TAG: ${{ steps.version.outputs.choreo_tag }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git add cmd/agent/main.go model/config.go go.mod go.sum .goreleaser.yml
          git commit -m "Apply Choreo agent patch for ${CHOREO_TAG}"
          git tag -f "$CHOREO_TAG"

      - name: Release patched agent
        if: steps.release_exists.outputs.exists != 'true'
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          workdir: agent-src
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
