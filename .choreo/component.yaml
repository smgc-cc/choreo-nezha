# Choreo Component Configuration
# 详细文档: https://wso2.com/choreo/docs/develop-components/configure-endpoints/

schemaVersion: 1.2

# Choreo 不支持 REST 和 WebSocket endpoint 共用同一端口。
# Nezha 自身在 8008 上同时支持 HTTP + WebSocket + gRPC，但 Choreo 网关层要求协议分端口声明。
# 因此这里暴露：
# - 8008: REST/HTTP Dashboard
# - 8009: WS endpoint，容器内由 Caddy 代理回 127.0.0.1:8008
endpoints:
  - name: nezha
    displayName: Nezha Dashboard
    service:
      basePath: /
      port: 8008
    type: REST
    networkVisibilities:
      - Public

  - name: nezha_ws
    displayName: Nezha WebSocket
    service:
      basePath: /
      port: 8009
    type: WS
    networkVisibilities:
      - Public
