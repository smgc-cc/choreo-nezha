# Choreo Component Configuration
# 详细文档: https://wso2.com/choreo/docs/develop-components/configure-endpoints/

schemaVersion: 1.2

# Choreo 不支持 REST 和 WebSocket endpoint 共用同一端口。
# Nezha 自身在 8008 上同时支持 HTTP + WebSocket + gRPC。
# 这里仅暴露 Choreo 支持 Public 的 REST/WS：
# - 8008: REST/HTTP Dashboard
# - 8009: WS endpoint，Caddy 分流：
#   - /grpc-tunnel -> grpc-ws-tunnel -> 127.0.0.1:8008，用于自定义 agent 的 gRPC-over-WebSocket
#   - 其他 WebSocket -> 127.0.0.1:8008，用于前端 WS
endpoints:
  - name: nezha
    displayName: Nezha Dashboard
    service:
      basePath: /
      port: 8008
    type: REST
    networkVisibilities:
      - Public

  - name: nezha_ws
    displayName: Nezha WebSocket
    service:
      basePath: /
      port: 8009
    type: WS
    networkVisibilities:
      - Public
