# Choreo Component Configuration
# 详细文档: https://wso2.com/choreo/docs/develop-components/configure-endpoints/

schemaVersion: 1.2

# Choreo 网关层按 endpoint 协议转发，不适合把 REST/WS/gRPC 混在同一端口暴露。
# Nezha 自身在 8008 上同时支持 HTTP + WebSocket + gRPC，这里用 Caddy 将 Choreo 要求的分协议端口
# 代理回 Nezha 的 8008：
# - 8008: REST/HTTP Dashboard
# - 8009: WS endpoint，Caddy 代理回 127.0.0.1:8008
# - 8010: gRPC endpoint，Caddy 通过 h2c 代理回 127.0.0.1:8008
endpoints:
  - name: nezha
    displayName: Nezha Dashboard
    service:
      basePath: /
      port: 8008
    type: REST
    networkVisibilities:
      - Public

  - name: nezha_ws
    displayName: Nezha WebSocket
    service:
      basePath: /
      port: 8009
    type: WS
    networkVisibilities:
      - Public

  - name: nezha_grpc
    displayName: Nezha gRPC
    service:
      basePath: /
      port: 8010
    type: GRPC
    networkVisibilities:
      - Public
